        shrink-0

        <!-- MOBILE BRAND -->

        <div

        <div
        class="
        hidden
        lg:flex
        items-center
        gap-3
        text-slate-400">

            <span>

                Workspace

            </span>

            <i
            class="

            fa-angle-right

            <span

            font-semibold">

    lg:block

    shrink-0">

        class="

        </div>

    </div>

    <div

    shrink-0">

        <button

        class="

        hover:text-white
        hover:bg-slate-800
        transition">

            <i
            class="
            fa-regular
            fa-bell

            <span

            -right-1
